services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    environment:
      TGMGMT_REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
    restart: unless-stopped

volumes:
  redis-data:
